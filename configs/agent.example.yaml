# Baseline example configuration.
# Start here if you want deterministic routing and built-in skills without any LLM dependency.

telegram:
  bot_token: "123456:replace-me"
  api_base_url: "https://api.telegram.org"
  mode: "polling"
  poll_timeout: 25s
  webhook:
    url: "https://bot.example.com/openlight/webhook"
    listen_addr: ":8081"
    secret_token: ""
    drop_pending_updates: false

auth:
  allowed_user_ids:
    - 111111111
  allowed_chat_ids:
    - 111111111

storage:
  sqlite_path: "./data/agent.db"

access:
  hosts:
    # Named SSH hosts can be reused by remote service entries.
    # vps:
    #   address: "203.0.113.10:22"
    #   user: "root"
    #   password_env: "OPENLIGHT_VPS_PASSWORD"
    #   known_hosts_path: "/home/pi/.ssh/known_hosts"
    #   sudo: false

files:
  allowed:
    - /tmp/openlight
    - /home/pi/scripts
    - /home/pi/openlight-work
  max_read_bytes: 4096
  list_limit: 40

workbench:
  enabled: false
  workspace_dir: "/tmp/openlight"
  allowed_runtimes:
    - python
    - sh
  allowed_files:
    - /usr/bin/uptime
  max_output_bytes: 8192

services:
  allowed:
    - tailscale
    - jellyfin
    # Compose-backed services are also supported:
    # - "synapse=compose:/home/pi/matrix/docker-compose.yml"
    # Direct Docker containers are also supported:
    # - "jitsi-web=docker:docker-jitsi-meet_web_1"
    # Remote services can target a named host from access.hosts:
    # - "jitsi-web=host:vps:compose:/opt/jitsi/docker-compose.yml:web"
    # - "jitsi-web=host:vps:docker:docker-jitsi-meet_web_1"
    # - "jitsi-jvb=host:vps:systemd:jitsi-videobridge2"
  log_lines: 100
  max_log_chars: 3000

