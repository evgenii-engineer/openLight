telegram:
  bot_token: "123456:replace-me"
  api_base_url: "https://api.telegram.org"
  mode: "polling"
  poll_timeout: 25s
  webhook:
    url: "https://bot.example.com/openlight/webhook"
    listen_addr: ":8081"
    secret_token: ""
    drop_pending_updates: false

auth:
  allowed_user_ids:
    - 111111111
  allowed_chat_ids:
    - 111111111

storage:
  sqlite_path: "./data/agent.db"

files:
  allowed:
    - /tmp/openlight
    - /home/pi/scripts
    - /home/pi/openlight-work
  max_read_bytes: 4096
  list_limit: 40

workbench:
  enabled: false
  workspace_dir: "/tmp/openlight"
  allowed_runtimes:
    - python
    - sh
  allowed_files:
    - /usr/bin/uptime
  max_output_bytes: 8192

services:
  allowed:
    - tailscale
    - jellyfin
  log_lines: 100

llm:
  enabled: false
  provider: "generic"
  endpoint: "http://127.0.0.1:8080"
  model: ""
  execute_threshold: 0.80
  mutating_execute_threshold: 0.95
  clarify_threshold: 0.60
  decision_input_chars: 160
  decision_num_predict: 128

chat:
  history_limit: 6
  history_chars: 900
  max_response_chars: 400

notes:
  list_limit: 20

agent:
  request_timeout: 5s

log:
  level: "info"
