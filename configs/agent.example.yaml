llm:
  enabled: false
  provider: "generic"
  endpoint: "http://127.0.0.1:8080"
  model: ""
  execute_threshold: 0.80
  clarify_threshold: 0.60
  decision_input_chars: 160
  decision_num_predict: 48

chat:
  history_limit: 6
  history_chars: 900
  max_response_chars: 400

notes:
  list_limit: 20

memory:
  enabled: true
  # Leave empty to reuse storage.sqlite_path. Set a separate path if you want
  # memory in its own SQLite file.
  db_path: ""
  list_limit: 20

voice:
  enabled: false
  provider: "whisper_cli"
  whisper_cli_path: "/opt/homebrew/bin/whisper-cli"
  model_path: "~/models/ggml-small.bin"
  ffmpeg_path: "/opt/homebrew/bin/ffmpeg"
  reply_with_transcript: true

browser:
  enabled: false
  node_path: "/opt/homebrew/bin/node"
  helper_path: "./tools/browser-agent/index.mjs"
  allow_all_domains: false
  allowed_domains:
    - example.com
  allow_private_network: false
  artifacts_dir: "./data/browser-artifacts"
  timeout_seconds: 20

agent:
  request_timeout: 5s

log:
  level: "info"
