# Deterministic safe test config for `make smoke-cli` and local CLI smoke
# checks. Uses no real Telegram, no LLM, no Docker, no network, no host
# integrations. Storage is a relative path so runs are sandboxed under
# the working directory.
#
# This file is the canonical input for documented P0 smoke checks. Do not
# wire credentials, real tokens, or production roots here.

telegram:
  bot_token: "test-token"
  api_base_url: "https://api.telegram.org"
  mode: "polling"
  poll_timeout: 25s

auth:
  allowed_user_ids:
    - 111111111
  allowed_chat_ids:
    - 111111111

storage:
  sqlite_path: "./data/test-agent.db"

filesystem:
  enabled: true
  allowed_roots:
    - ./testdata/files
  allow_write: false
  redact_secrets: true
  max_read_bytes: 4096
  list_limit: 40

services:
  allowed:
    - fake-service
  log_lines: 20
  max_log_chars: 1000

watch:
  enabled: true
  poll_interval: 15s
  ask_ttl: 10m

llm:
  enabled: false
  provider: "generic"
  execute_threshold: 0.80
  clarify_threshold: 0.60
  decision_input_chars: 160
  decision_num_predict: 48

chat:
  history_limit: 6
  history_chars: 900
  max_response_chars: 400

notes:
  list_limit: 20

memory:
  enabled: true
  list_limit: 20

browser:
  enabled: false
  timeout_seconds: 20

vision:
  enabled: false

ocr:
  enabled: false

visual_watch:
  enabled: false

agent:
  request_timeout: 5s

log:
  level: "info"
