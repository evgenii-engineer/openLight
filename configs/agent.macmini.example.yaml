# Mac mini M1 local-first example configuration.
# This profile keeps the main runtime deterministic-first, enables the new
# memory/filesystem/browser/voice surfaces, and stays safe by default.

telegram:
  bot_token: "123456:replace-me"
  api_base_url: "https://api.telegram.org"
  mode: "polling"
  poll_timeout: 25s

auth:
  allowed_user_ids:
    - 111111111
  allowed_chat_ids:
    - 111111111

storage:
  sqlite_path: "./data/agent.db"

files:
  enabled: true
  allowed_roots:
    - ~/openlight
    - ~/homelab
    - ~/notes
  allow_write: false
  redact_secrets: true
  max_read_bytes: 4096
  list_limit: 40

services:
  allowed:
    - tailscale
    - jellyfin
  log_lines: 100
  max_log_chars: 3000

watch:
  enabled: true
  poll_interval: 15s
  ask_ttl: 10m

llm:
  enabled: false
  # Top-level provider/endpoint are shared by FAST and SMART unless a profile
  # overrides them. `model` is the legacy single-model fallback used when no
  # `profiles.smart` entry is defined.
  provider: "ollama"
  endpoint: "http://127.0.0.1:11434"
  model: "gemma3-12b-8k"
  execute_threshold: 0.80
  clarify_threshold: 0.60
  decision_input_chars: 160
  decision_num_predict: 48

  # Always-warm policy. On agent startup the listed profiles are pinned
  # into Ollama with `keep_alive` so users never wait on a cold model
  # load. Recognized profile names: "fast", "smart", "vision". The 12B
  # SMART model has the worst cold start, so it's the only one worth
  # pinning by default. `keep_alive: -1` keeps the model resident until
  # another model evicts it or Ollama restarts. The prompt is a tiny
  # no-op string used only to trigger the load.
  #
  # Per-profile keep_alive below controls what is sent on *normal* (non-
  # warmup) requests. By default smart inherits "-1", fast inherits
  # "10m", vision inherits "5m" — set explicitly to override.
  warmup:
    enabled: true
    profiles: ["smart"]
    keep_alive: -1
    prompt: "warmup"

  # Two-tier routing: FAST handles cheap classification / argument extraction
  # / route decisions; SMART handles reasoning, final answers, and log
  # explanations. Leave `profiles` empty to use the legacy single-model setup.
  #
  # `num_ctx` caps the Ollama context window per profile. Zero (or omitted)
  # leaves Ollama on its model default — which in Ollama is often only 4096
  # even for models that natively support 128k. Trim the window to free VRAM
  # for the KV cache: FAST barely needs more than ~512 tokens, SMART needs
  # room for history (~900 chars) + system prompt + answer.
  profiles:
    fast:
      model: "qwen2.5:1.5b"
      decision_input_chars: 160
      decision_num_predict: 64
      num_ctx: 1024
    smart:
      model: "gemma3-12b-8k"
      decision_num_predict: 256
      num_ctx: 4096

chat:
  history_limit: 6
  history_chars: 900
  max_response_chars: 400

notes:
  list_limit: 20

memory:
  enabled: true
  db_path: ""
  list_limit: 20

voice:
  enabled: true
  provider: "whisper_cli"
  whisper_cli_path: "/opt/homebrew/bin/whisper-cli"
  model_path: "~/models/ggml-small.bin"
  ffmpeg_path: "/opt/homebrew/bin/ffmpeg"
  reply_with_transcript: true

browser:
  enabled: true
  node_path: "/opt/homebrew/bin/node"
  helper_path: "./tools/browser-agent/index.mjs"
  # When true, browser skill can access any public domain.
  # `allow_private_network` still controls localhost/LAN access.
  allow_all_domains: true
  allowed_domains:
    - example.com
    - github.com
  allow_private_network: false
  artifacts_dir: "./data/browser-artifacts"
  timeout_seconds: 20

# Vision: describe screenshots and compare images using a local vision model.
# Pair with a small Ollama model for Mac mini M1 (e.g. qwen2.5vl:3b or
# minicpm-v:latest). Disabled by default — enable when you have the model
# pulled locally.
vision:
  enabled: false
  provider: "ollama"
  endpoint: "http://127.0.0.1:11434"
  model: "qwen2.5vl:3b"
  max_image_size_mb: 10
  timeout: 30s
  default_prompt: "Describe this image in concise plain English."
  max_response_chars: 1500

# OCR: extract text from screenshots and photos. tesseract is the default —
# `make install-ocr-deps` installs it via brew. For best macOS Vision-quality
# you can build a Swift helper that wraps the Vision framework and switch to
# `provider: apple_vision` with `binary_path` pointing at it.
ocr:
  enabled: false
  provider: "tesseract"
  binary_path: "/opt/homebrew/bin/tesseract"
  languages:
    - "eng"
    - "rus"
  timeout: 20s
  max_image_size_mb: 10

# Visual watch periodically captures screenshots of allowlisted URLs, diffs
# them against the previous baseline, and notifies the chat when something
# changes. Requires browser.enabled = true. When ocr.enabled is also true,
# keyword matches are checked against OCR'd text first and fall back to the
# visible HTML text otherwise.
visual_watch:
  enabled: false
  baselines_dir: "./data/visual-watch"
  poll_interval: 30s
  default_interval: 15m
  default_threshold: 0.15
  default_cooldown: 30m
  request_timeout: 60s

agent:
  # Upper bound for any single skill execution. 90s comfortably covers
  # vision-model first loads (Ollama warming up qwen2.5vl) and OCR on
  # large screenshots. Most skills finish in seconds.
  request_timeout: 90s

log:
  level: "info"
